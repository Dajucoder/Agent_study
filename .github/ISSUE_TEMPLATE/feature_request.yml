name: ✨ 功能建议
description: 为本项目提改进想法
title: "[Feature] "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        描述你希望增加的能力。它可以是一个新示例、新文档章节、CI 改进或工作流优化。

  - type: dropdown
    id: type
    attributes:
      label: "建议类型"
      options:
        - "新示例（examples/）"
        - "新笔记本（notebooks/）"
        - "新文档章节（docs/）"
        - "新工具 / 工程化"
        - "对现有功能的改进"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "你想解决什么问题？"
      description: "说明动机与背景，越具体越有助于评审"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "你建议的方案"
      description: "可附代码片段、目录结构、参考链接"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "已考虑过的替代方案"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "补充上下文"
      description: "截图、相关 Issue、相关 PR、参考文档等"
    validations:
      required: false
