name: 🐛 Bug 报告
description: 报告示例代码、文档或脚本的运行错误
title: "[Bug] "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢你帮助改进本项目！请填写下面的信息，能让我们更快定位问题。

  - type: dropdown
    id: component
    attributes:
      label: "涉及章节"
      description: "请选择问题所在的章节或类别"
      options:
        - "00 · 环境验证"
        - "01 · 模型与提示词"
        - "02 · 链（LCEL）"
        - "03 · 记忆"
        - "04 · 检索与 RAG"
        - "05 · 代理（Agents）"
        - "06 · 服务化（LangServe）"
        - "文档（docs/）"
        - "笔记本（notebooks/）"
        - "其他 / 通用"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: "复现步骤"
      description: "最小可复现的命令或代码片段"
      placeholder: |
        1. 执行 `python examples/04_rag.py`
        2. 看到报错：`...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "期望行为"
      description: "你认为正确的输出应当是什么"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "实际行为"
      description: "实际输出或完整报错堆栈"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: "Python 版本"
      placeholder: "3.11.7"
    validations:
      required: true

  - type: input
    id: packages
    attributes:
      label: "关键依赖版本"
      description: "至少包含 langchain、openai、chromadb"
      placeholder: "langchain==1.3.11, openai==2.26.0, chromadb==1.5.2"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: "操作系统"
      options:
        - "Windows 11"
        - "Windows 10"
        - "macOS 14+"
        - "macOS 13"
        - "Ubuntu 22.04"
        - "Ubuntu 20.04"
        - "其他 Linux"
        - "WSL2"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: "LLM 提供方"
      options:
        - "OpenAI 官方"
        - "Azure OpenAI"
        - "第三方 OpenAI 兼容服务（如 aiping.cn）"
        - "Ollama 本地"
        - "其他"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "日志/截图"
      description: "如有截图可拖拽到下方评论区"

  - type: checkboxes
    id: checklist
    attributes:
      label: "自检清单"
      options:
        - label: "我已搜索过现有 Issue，确认无人报告过"
          required: true
        - label: "我已阅读 [docs/ENV_SETUP.md](../blob/main/docs/ENV_SETUP.md) 并按步骤操作"
          required: true
        - label: "我已确认 `.env` 已正确配置（且未提交到 git）"
          required: true
