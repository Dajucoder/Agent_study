# Dependabot 配置：自动检查依赖更新
# 详细文档：https://docs.github.com/zh/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # ---- Python 依赖 ----
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      # 把 langchain 生态合成一组
      langchain:
        patterns:
          - "langchain*"
          - "openai"
          - "tiktoken"
      # 其它依赖一组
      other:
        patterns:
          - "*"
    # 提交前缀
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

  # ---- GitHub Actions ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(actions)"

# 设置忽略的依赖（不希望自动升的大版本）
# ignore:
#   - dependency-name: "langchain"
#     versions: ["1.x", "2.x"]
